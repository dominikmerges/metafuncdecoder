  peptidoglycanase:
    description: "Peptidoglycanases — degrade bacterial cell wall peptidoglycan (microbial necromass)"
    # Substrate: bacterial cell wall peptidoglycan. Includes lysozymes, lytic transglycosylases,
    # and phage endolysins. Included per López-Mondéjar et al. (2022) Table S3.
    families:
      - GH22    # lysozyme type C (EC 3.2.1.17) — hen egg white lysozyme type
      - GH23    # lysozyme type G (EC 3.2.1.17); peptidoglycan lytic transglycosylase
      - GH24    # lysozyme (EC 3.2.1.17) — bacteriophage T4 type
      - GH25    # lysozyme (EC 3.2.1.17)
