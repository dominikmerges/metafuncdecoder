      - GH14   # β-amylase
      - GH15   # glucoamylase, glucodextranase
      - GH31   # α-glucosidase, sucrase-isomaltase
      - GH57   # α-amylase, 4-α-glucanotransferase
      - GH77   # 4-α-glucanotransferase (amylomaltase, EC 2.4.1.25)
      # Additional alpha-glucan-active families (López-Mondéjar 2022 Table S3)
