  chitinase:
    description: "Chitin-degrading enzymes — degrade arthropod cuticle and fungal cell wall chitin"
    families:
      # GH18 and GH19 are the dominant chitinase families in soil.
      - GH18   # chitinase (class I–IV); dominant soil chitinase
      - GH19   # chitinase (plant-type, class I/II)
      - GH20   # β-N-acetylhexosaminidase (cleaves chitin oligomers and N-glycans)
      - GH46   # chitosanase, chitinase
      - GH75   # chitosanase
      # Subfamily entry (requires dbCAN_sub annotation):
      - GH5_48 # N-acetyl-β-glucosaminidase (EC 3.2.1.52); chitosanase (EC 3.2.1.132)
      - CE4    # chitin deacetylase (EC 3.5.1.41) — also listed under other_hemicellulase (acetyl xylan esterase)
    patterns:
      - "chitinase"
      # Anchored to require an EC number: prevents false matches on contextual mentions
      # (e.g. CBM32 FamInfo names an N-acetylglucosaminidase enzyme it is found in,
      # but CBM32 itself is a galactose/polygalacturonate-binding module, not a chitinase).
      - "N-acetylglucosaminidase \\(EC"
      - "chitin deacetylase"

