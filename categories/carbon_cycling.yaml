      - GH70   # dextransucrase (EC 2.4.1.5) — biosynthetic glycosyltransferase (EC 2.4), not hydrolytic; synthesises dextran; included per Table S3
      - GH100  # alkaline/neutral invertase (EC 3.2.1.26)
      - GH119  # α-amylase (EC 3.2.1.1); distantly related to GH57
      - GH122  # α-glucosidase (EC 3.2.1.20)
      - GH126  # α-amylase (EC 3.2.1.-)
      - GH133  # amylo-α-1,6-glucosidase (EC 3.2.1.33)    patterns:
